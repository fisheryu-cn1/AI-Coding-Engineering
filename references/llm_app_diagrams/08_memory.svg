<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640">
  <defs>
    <marker id="arrowA" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowC" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowE" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrowF" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowH" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowGlass" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { font-size: 30px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 14px; font-weight: 500; fill: #6b7280; }
    .section { font-size: 13px; font-weight: 700; fill: #2563eb; letter-spacing: 1.4px; }
    .section-sub { font-size: 12px; font-weight: 500; fill: #94a3b8; }
    .node-title { font-size: 18px; font-weight: 700; fill: #111827; }
    .node-sub { font-size: 12px; font-weight: 500; fill: #6b7280; }
    .node-type { font-size: 12px; font-weight: 700; fill: #9ca3af; letter-spacing: 0.08em; }
    .arrow-label { font-size: 12px; font-weight: 600; fill: #6b7280; }
    .legend { font-size: 12px; font-weight: 500; fill: #6b7280; }
    .footnote { font-size: 12px; font-weight: 500; fill: #94a3b8; }
    </style>
  </defs>
  <rect width="960.0" height="640.0" fill="#ffffff"/>
  <text x="480.0" y="56" text-anchor="middle" class="title">工程模式：分层记忆架构</text>
  <text x="480.0" y="82" text-anchor="middle" class="subtitle">五层记忆架构</text>
  <path d="M 480.0,180.0 L 480.0,210.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 480.0,280.0 L 480.0,310.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 480.0,380.0 L 480.0,410.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 480.0,480.0 L 480.0,510.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <rect x="180.0" y="110.0" width="600.0" height="70.0" rx="10.0" fill="#fef2f2" stroke="#fecaca" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="480.0" y="128.0" text-anchor="middle" class="node-type">第一层</text>
  <text x="480.0" y="151.0" text-anchor="middle" class="node-title">系统提示 + 当前任务指令</text>
  <text x="480.0" y="173.0" text-anchor="middle" class="node-sub">System Prompt + Task Context / 始终保留，最高优先级</text>
  <rect x="180.0" y="210.0" width="600.0" height="70.0" rx="10.0" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="480.0" y="228.0" text-anchor="middle" class="node-type">第二层</text>
  <text x="480.0" y="251.0" text-anchor="middle" class="node-title">工作记忆（Working Memory）</text>
  <text x="480.0" y="273.0" text-anchor="middle" class="node-sub">最近 3-5 轮对话 + 关键中间结果 / Sliding Window</text>
  <rect x="180.0" y="310.0" width="600.0" height="70.0" rx="10.0" fill="#fefce8" stroke="#fde047" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="480.0" y="328.0" text-anchor="middle" class="node-type">第三层</text>
  <text x="480.0" y="351.0" text-anchor="middle" class="node-title">摘要记忆（Summary Memory）</text>
  <text x="480.0" y="373.0" text-anchor="middle" class="node-sub">早期对话的压缩摘要 / Condensed History</text>
  <rect x="180.0" y="410.0" width="600.0" height="70.0" rx="10.0" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="480.0" y="428.0" text-anchor="middle" class="node-type">第四层</text>
  <text x="480.0" y="451.0" text-anchor="middle" class="node-title">检索记忆（Retrieval Memory）</text>
  <text x="480.0" y="473.0" text-anchor="middle" class="node-sub">从向量库实时召回的相关片段 / RAG / Vector Search</text>
  <rect x="180.0" y="510.0" width="600.0" height="70.0" rx="10.0" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="480.0" y="528.0" text-anchor="middle" class="node-type">第五层</text>
  <text x="480.0" y="551.0" text-anchor="middle" class="node-title">事实记忆（Fact Memory）</text>
  <text x="480.0" y="573.0" text-anchor="middle" class="node-sub">结构化提取的用户偏好、业务规则 / Key-Value / Graph DB</text>
</svg>